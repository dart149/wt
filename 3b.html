<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multimedia Page</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    video, audio {
      margin: 20px 0;
      width: 600px; /* You can adjust the width as needed */
    }
  </style>
</head>
<body>
  <h1>Welcome to the Multimedia Page</h1>

  <h2>Video Player</h2>
  <video controls>
    <source src="videoplayback.mp4" type="video/mp4"/>
    
  </video>

  <h2>Audio Player</h2>
  <audio controls>
    <source src="" type="audio/mp3">
    Your browser does not support the audio tag.
  </audio>

</body>
</html>
